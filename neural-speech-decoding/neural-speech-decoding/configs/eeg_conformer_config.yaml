# ──────────────────────────────────────────────────────────────────────────────
# EEGConformer v1 configuration
# ──────────────────────────────────────────────────────────────────────────────

# Dataset
data_name:   NeuralPhoneme
session:     t15.2023.08.18
drive_dir:   /content/drive/MyDrive/hdf5_data_final/
local_dir:   /content/local_data/hdf5_data_final
max_files:   null

# Neural signal
num_electrodes:  512
time_sample_num: 1500

# EEGConformer architecture
emb_size:           128
temporal_kernel:    [1, 10]
pool_kernel:        [1, 15]
pool_stride:        [1, 8]
transformer_depth:  6
num_heads:          8
ffn_hidden:         256
class_num:          41

# Training — Phase 1
dropoutRate:   0.3
lr:            1.0e-3
batch_size:    32
max_epoch:     100
eval_interval: 5

# Training — Phase 2 (continuation)
phase2_lr:       5.0e-4
phase2_dropout:  0.2
phase2_epochs:   50
